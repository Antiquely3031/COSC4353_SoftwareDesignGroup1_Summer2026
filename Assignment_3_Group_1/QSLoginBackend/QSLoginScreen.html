<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QueueSmart — Auth</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Literata:opsz,wght@7..72,400;7..72,500;7..72,600;7..72,700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1E4CD2;
    --card:#172B3E;
    --field:#172B3E;
    --text:#F2F9F8;
    --muted:#8b8b96;
    --linktext:#F2F9F8;
    --gold-dim: rgba(201,161,92,0.35);
    --error:#e8836b;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    background:var(--ink);
    justify-content:center;
  }
  .screen{
    background:var(--ink);
    width:100%;
    padding:36px 26px 30px;
    display:flex;
    flex-direction:column;
  }
  .header-flow{
    position:relative;
    height:64px;
    margin-bottom:18px;
  }
  .logo{
    height:64px;
    width:auto;
    position:absolute;
    left:0;
    top:0;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.3));
    z-index:2;
  }
  .wave{
    position:absolute;
    left:26px;
    bottom:10px;
    width:calc(100% - 26px);
    height:22px;
    z-index:1;
  }
  .wave svg path{
    stroke:var(--gold-dim);
    stroke-width:1.5;
    fill:none;
    stroke-linecap:round;
    stroke-dasharray:6 8;
    animation:drift 6s linear infinite;
  }
  @keyframes drift{
    0%{ stroke-dashoffset:0; }
    100%{ stroke-dashoffset:-120; }
  }
  .eyebrow{
    font-size:11px;
    letter-spacing:0.16em;
    text-transform:uppercase;
    color:var(--linktext);
    margin:0 0 8px;
    font-weight:500;
  }
  h1{
    font-family:'Literata',serif;
    font-weight:500;
    font-size:30px;
    color:var(--text);
    margin:0 0 6px;
    letter-spacing:-0.01em;
  }
  .sub{
    color:var(--muted);
    font-size:14px;
    margin:0 0 18px;
    line-height:1.5;
  }
  .toggle{
    display:flex;
    background:var(--field);
    border-radius:12px;
    padding:4px;
    margin-bottom:26px;
  }
  .toggle button{
    flex:1;
    padding:9px 0;
    border:none;
    background:transparent;
    color:var(--muted);
    font-family:'Literata',serif;
    font-size:13px;
    font-weight:600;
    border-radius:9px;
    cursor:pointer;
    transition:all .2s ease;
  }
  .toggle button.active{
    background:var(--ink);
    color:var(--linktext);
    box-shadow: inset 0 0 0 1px rgba(201,161,92,0.25);
  }
  form{ display:flex; flex-direction:column; gap:14px; }
  .field{ display:flex; flex-direction:column; gap:6px; }
  .field label{
    font-size:12px;
    color:var(--muted);
    font-weight:500;
  }
  .field input{
    background:var(--field);
    border:1px solid transparent;
    border-radius:10px;
    padding:13px 14px;
    color:var(--text);
    font-family:'Literata',serif;
    font-size:14px;
    outline:none;
    transition:border-color .15s ease;
  }
  .field input:focus{
    border-color:var(--gold-dim);
  }
  .field input.err{
    border-color:var(--error);
  }
  .errmsg{
    font-size:12px;
    color:var(--error);
    min-height:14px;
  }
  .submit{
    margin-top:8px;
    background:var(--linktext);
    color:#1a1508;
    border:none;
    border-radius:10px;
    padding:14px 0;
    font-family:'Literata',serif;
    font-weight:600;
    font-size:14px;
    cursor:pointer;
    transition:transform .12s ease, opacity .12s ease;
  }
  .submit:active{ transform:scale(0.98); }
  .foot{
    margin-top:auto;
    padding-top:24px;
    text-align:center;
    font-size:14px;
    color:var(--muted);
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .foot span{
    color:var(--linktext);
    font-weight:600;
    cursor:pointer;
  }
  .admin-link{
    color:var(--muted);
    font-weight:500;
    font-size:12px;
  }
  .hidden{ display:none; }
  .toast{
    position:absolute;
    left:26px; right:26px; bottom:20px;
    background:var(--field);
    border:1px solid var(--gold-dim);
    color:var(--text);
    font-size:13px;
    padding:12px 14px;
    border-radius:10px;
    opacity:0;
    transform:translateY(8px);
    transition:all .25s ease;
    pointer-events:none;
  }
  .toast.show{ opacity:1; transform:translateY(0); }
</style>
</head>
<body>

<div class="phone">
  <div class="screen">
    <div class="notch"></div>
    <div class="header-flow">
      <img src="../QueueSmartLogo.png" alt="QueueSmart logo" class="logo">
      <div class="wave">
        <svg viewBox="0 0 260 22" width="100%" height="22" preserveAspectRatio="none">
          <path d="M0,12 C18,12 20,4 38,4 C58,4 60,16 82,16 C106,16 108,8 134,8 C162,8 168,13 200,13 C224,13 230,10 260,10"/>
        </svg>
      </div>
    </div>

    <p class="eyebrow">QueueSmart</p>
    <h1 id="heading">Welcome</h1>
    <p class="sub" id="subtext">The smart solution to your queue needs.</p>

    <div class="toggle" id="mainToggle">
      <button id="loginTab" class="active" onclick="switchTab('login')">Log in</button>
      <button id="signupTab" onclick="switchTab('signup')">Sign up</button>
    </div>

    <form id="loginForm" onsubmit="return handleLogin(event)">
      <div class="field">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="you@example.com">
        <div class="errmsg" id="loginEmailErr"></div>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••">
        <div class="errmsg" id="loginPasswordErr"></div>
      </div>
      <button type="submit" class="submit">Log in</button>
    </form>

    <form id="signupForm" class="hidden" onsubmit="return handleSignup(event)">
      <div class="field">
        <label>Name</label>
        <input type="text" id="signupName" placeholder="Your name" maxlength="50">
        <div class="errmsg" id="signupNameErr"></div>
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="signupEmail" placeholder="you@example.com">
        <div class="errmsg" id="signupEmailErr"></div>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="signupPassword" placeholder="8-20 characters" maxlength="20">
        <div class="errmsg" id="signupPasswordErr"></div>
      </div>
      <div class="field">
        <label>Confirm password</label>
        <input type="password" id="signupConfirm" placeholder="••••••••">
        <div class="errmsg" id="signupConfirmErr"></div>
      </div>
      <button type="submit" class="submit">Create account</button>
    </form>

    <form id="adminForm" class="hidden" onsubmit="return handleAdminLogin(event)">
      <div class="field">
        <label>Admin Email</label>
        <input type="email" id="adminEmail" placeholder="admin@queuesmart.com">
        <div class="errmsg" id="adminEmailErr"></div>
      </div>
      <div class="field">
        <label>Admin Password</label>
        <input type="password" id="adminPassword" placeholder="••••••••">
        <div class="errmsg" id="adminPasswordErr"></div>
      </div>
      <button type="submit" class="submit">Log in as Admin</button>
    </form>

    <div class="foot">
      <span id="footLink" onclick="switchTab('signup')">New here? Create an account</span>
      <span id="adminLink" class="admin-link" onclick="switchTab('admin')">Administrator Login</span>
    </div>

    <div class="toast" id="toast"></div>
  </div>
</div>

<script src="QSLoginScreen.js"></script>>
</body>
</html>
