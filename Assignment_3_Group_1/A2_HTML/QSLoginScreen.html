<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QueueSmart — Auth</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Literata:opsz,wght@7..72,400;7..72,500;7..72,600;7..72,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../A2_CSS/QSLoginScreen.css">
<script src="../JavaScript/QSLoginScreen.js" defer></script>
</head>
<body>

<div class="phone">
  <div class="screen">
    <div class="notch"></div>
    <div class="header-flow">
      <img src="../QueueSmartLogo.png" alt="QueueSmart logo" class="logo">
      <div class="wave">
        <svg viewBox="0 0 260 22" width="100%" height="22" preserveAspectRatio="none">
          <path d="M0,12 C18,12 20,4 38,4 C58,4 60,16 82,16 C106,16 108,8 134,8 C162,8 168,13 200,13 C224,13 230,10 260,10"/>
        </svg>
      </div>
    </div>

    <p class="eyebrow">QueueSmart</p>
    <h1 id="heading">Welcome</h1>
    <p class="sub" id="subtext">The smart solution to your queue needs.</p>

    <div class="toggle" id="mainToggle">
      <button id="loginTab" class="active" onclick="switchTab('login')">Log in</button>
      <button id="signupTab" onclick="switchTab('signup')">Sign up</button>
    </div>

    <form id="loginForm" onsubmit="return handleLogin(event)">
      <div class="field">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="you@example.com">
        <div class="errmsg" id="loginEmailErr"></div>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••">
        <div class="errmsg" id="loginPasswordErr"></div>
      </div>
      <button type="submit" class="submit">Log in</button>
    </form>

    <form id="signupForm" class="hidden" onsubmit="return handleSignup(event)">
      <div class="field">
        <label>Name</label>
        <input type="text" id="signupName" placeholder="Your name" maxlength="50">
        <div class="errmsg" id="signupNameErr"></div>
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="signupEmail" placeholder="you@example.com">
        <div class="errmsg" id="signupEmailErr"></div>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="signupPassword" placeholder="8-20 characters" maxlength="20">
        <div class="errmsg" id="signupPasswordErr"></div>
      </div>
      <div class="field">
        <label>Confirm password</label>
        <input type="password" id="signupConfirm" placeholder="••••••••">
        <div class="errmsg" id="signupConfirmErr"></div>
      </div>
      <button type="submit" class="submit">Create account</button>
    </form>

    <form id="adminForm" class="hidden" onsubmit="return handleAdminLogin(event)">
      <div class="field">
        <label>Admin Email</label>
        <input type="email" id="adminEmail" placeholder="admin@queuesmart.com">
        <div class="errmsg" id="adminEmailErr"></div>
      </div>
      <div class="field">
        <label>Admin Password</label>
        <input type="password" id="adminPassword" placeholder="••••••••">
        <div class="errmsg" id="adminPasswordErr"></div>
      </div>
      <button type="submit" class="submit">Log in as Admin</button>
    </form>

    <div class="foot">
      <span id="footLink" onclick="switchTab('signup')">New here? Create an account</span>
      <span id="adminLink" class="admin-link" onclick="switchTab('admin')">Administrator Login</span>
    </div>

    <div class="toast" id="toast"></div>
  </div>
</div>

</body>
</html>
