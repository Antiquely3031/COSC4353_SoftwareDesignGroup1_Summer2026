<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queue Status</title>

    <!--Shared user styling-->
    <link rel="stylesheet" href="./QS-UserDashboard.css">
    <!--Styling dedicated to this page-->
    <link rel="stylesheet" href="./queue-status.css">

    <script src="./QS-User.js" defer></script>
</head>

<body>
    <header class="top-header">
        <div class="logo-area">
            <img src="QueueSmartLogo.png" alt="QueueSmart Logo">
        </div>

        <h1>QueueSmart</h1>
        <p>Queue Status</p>
    </header>

    <nav class="navbar">
        <a href="QS-UserDashboard.html">Dashboard</a>
        <a href="join-queue.html">Join Queue</a>
        <a href="queue-status.html">Queue Status</a>
        <a href="queue-history.html">History</a>
        <a href="QSLoginScreen.html">Logout</a>
    </nav>

    <main id="queueStatusPage" class="dashboard-container">

        <section class="card">
            <h2>Queue Status</h2>
            <p><em>Viewing status of queue position, wait time, service operations</em></p>
        </section>

        <section class="card queue-status-card">

            <h2 id="statusService">No active queue currently</h2>

            <div class="status-information">

                <div class="status-row">
                    <span class="status-label">Current Position</span>
                    <span id="statusPosition" class="status-value">--</span>
                </div>


                <div class="status-row">
                    <span class="status-label">Estimated Wait</span>
                    <span id="statusWaitTime" class="status-value">46 minutes</span>
                </div>


                <div class="status-row">
                    <span class="status-label">Current Status</span>

                    <span id="statusCurrent" class="status-badge">Not Joined</span>
                </div>

            </div>

        </section>
    </main>
</body>

</html>
