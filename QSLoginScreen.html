<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QueueSmart — Auth</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Literata:opsz,wght@7..72,400;7..72,500;7..72,600;7..72,700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1E4CD2;
    --card:#172B3E;
    --field:#172B3E;
    --text:#F2F9F8;
    --muted:#8b8b96;
    --linktext:#F2F9F8;
    --gold-dim: rgba(201,161,92,0.35);
    --error:#e8836b;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    background:var(--ink);
    justify-content:center;
  }
  .screen{
    background:var(--ink);
    width:100%;
    padding:36px 26px 30px;
    display:flex;
    flex-direction:column;
  }
  .header-flow{
    position:relative;
    height:64px;
    margin-bottom:18px;
  }
  .logo{
    height:64px;
    width:auto;
    position:absolute;
    left:0;
    top:0;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.3));
    z-index:2;
  }
  .wave{
    position:absolute;
    left:26px;
    bottom:10px;
    width:calc(100% - 26px);
    height:22px;
    z-index:1;
  }
  .wave svg path{
    stroke:var(--gold-dim);
    stroke-width:1.5;
    fill:none;
    stroke-linecap:round;
    stroke-dasharray:6 8;
    animation:drift 6s linear infinite;
  }
  @keyframes drift{
    0%{ stroke-dashoffset:0; }
    100%{ stroke-dashoffset:-120; }
  }
  .eyebrow{
    font-size:11px;
    letter-spacing:0.16em;
    text-transform:uppercase;
    color:var(--linktext);
    margin:0 0 8px;
    font-weight:500;
  }
  h1{
    font-family:'Literata',serif;
    font-weight:500;
    font-size:30px;
    color:var(--text);
    margin:0 0 6px;
    letter-spacing:-0.01em;
  }
  .sub{
    color:var(--muted);
    font-size:14px;
    margin:0 0 18px;
    line-height:1.5;
  }
  .toggle{
    display:flex;
    background:var(--field);
    border-radius:12px;
    padding:4px;
    margin-bottom:26px;
  }
  .toggle button{
    flex:1;
    padding:9px 0;
    border:none;
    background:transparent;
    color:var(--muted);
    font-family:'Literata',serif;
    font-size:13px;
    font-weight:600;
    border-radius:9px;
    cursor:pointer;
    transition:all .2s ease;
  }
  .toggle button.active{
    background:var(--ink);
    color:var(--linktext);
    box-shadow: inset 0 0 0 1px rgba(201,161,92,0.25);
  }
  form{ display:flex; flex-direction:column; gap:14px; }
  .field{ display:flex; flex-direction:column; gap:6px; }
  .field label{
    font-size:12px;
    color:var(--muted);
    font-weight:500;
  }
  .field input{
    background:var(--field);
    border:1px solid transparent;
    border-radius:10px;
    padding:13px 14px;
    color:var(--text);
    font-family:'Literata',serif;
    font-size:14px;
    outline:none;
    transition:border-color .15s ease;
  }
  .field input:focus{
    border-color:var(--gold-dim);
  }
  .field input.err{
    border-color:var(--error);
  }
  .errmsg{
    font-size:12px;
    color:var(--error);
    min-height:14px;
  }
  .submit{
    margin-top:8px;
    background:var(--linktext);
    color:#1a1508;
    border:none;
    border-radius:10px;
    padding:14px 0;
    font-family:'Literata',serif;
    font-weight:600;
    font-size:14px;
    cursor:pointer;
    transition:transform .12s ease, opacity .12s ease;
  }
  .submit:active{ transform:scale(0.98); }
  .foot{
    margin-top:auto;
    padding-top:24px;
    text-align:center;
    font-size:14px;
    color:var(--muted);
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .foot span{
    color:var(--linktext);
    font-weight:600;
    cursor:pointer;
  }
  .admin-link{
    color:var(--muted);
    font-weight:500;
    font-size:12px;
  }
  .hidden{ display:none; }
  .toast{
    position:absolute;
    left:26px; right:26px; bottom:20px;
    background:var(--field);
    border:1px solid var(--gold-dim);
    color:var(--text);
    font-size:13px;
    padding:12px 14px;
    border-radius:10px;
    opacity:0;
    transform:translateY(8px);
    transition:all .25s ease;
    pointer-events:none;
  }
  .toast.show{ opacity:1; transform:translateY(0); }
</style>
</head>

    <p class="eyebrow">QueueSmart</p>
    <h1 id="heading">Welcome</h1>
    <p class="sub" id="subtext">The smart solution to your queue needs.</p>

    <div class="toggle" id="mainToggle">
      <button id="loginTab" class="active" onclick="switchTab('login')">Log in</button>
      <button id="signupTab" onclick="switchTab('signup')">Sign up</button>
    </div>

    <form id="loginForm" onsubmit="return handleLogin(event)">
      <div class="field">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="you@example.com">
        <div class="errmsg" id="loginEmailErr"></div>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••">
        <div class="errmsg" id="loginPasswordErr"></div>
      </div>
      <button type="submit" class="submit">Log in</button>
    </form>

    <form id="signupForm" class="hidden" onsubmit="return handleSignup(event)">
      <div class="field">
        <label>Name</label>
        <input type="text" id="signupName" placeholder="Your name" maxlength="50">
        <div class="errmsg" id="signupNameErr"></div>
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="signupEmail" placeholder="you@example.com">
        <div class="errmsg" id="signupEmailErr"></div>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="signupPassword" placeholder="8-20 characters" maxlength="20">
        <div class="errmsg" id="signupPasswordErr"></div>
      </div>
      <div class="field">
        <label>Confirm password</label>
        <input type="password" id="signupConfirm" placeholder="••••••••">
        <div class="errmsg" id="signupConfirmErr"></div>
      </div>
      <button type="submit" class="submit">Create account</button>
    </form>

    <form id="adminForm" class="hidden" onsubmit="return handleAdminLogin(event)">
      <div class="field">
        <label>Admin Email</label>
        <input type="email" id="adminEmail" placeholder="admin@queuesmart.com">
        <div class="errmsg" id="adminEmailErr"></div>
      </div>
      <div class="field">
        <label>Admin Password</label>
        <input type="password" id="adminPassword" placeholder="••••••••">
        <div class="errmsg" id="adminPasswordErr"></div>
      </div>
      <button type="submit" class="submit">Log in as Admin</button>
    </form>

    <div class="foot">
      <span id="footLink" onclick="switchTab('signup')">New here? Create an account</span>
      <span id="adminLink" class="admin-link" onclick="switchTab('admin')">Administrator Login</span>
    </div>

    <div class="toast" id="toast"></div>
  </div>
</div>

<script>
function switchTab(tab){
  const loginTab = document.getElementById('loginTab');
  const signupTab = document.getElementById('signupTab');
  const loginForm = document.getElementById('loginForm');
  const signupForm = document.getElementById('signupForm');
  const adminForm = document.getElementById('adminForm');
  const mainToggle = document.getElementById('mainToggle');
  const heading = document.getElementById('heading');
  const subtext = document.getElementById('subtext');
  const footLink = document.getElementById('footLink');
  const adminLink = document.getElementById('adminLink');

  // Resets forms
  loginForm.classList.add('hidden');
  signupForm.classList.add('hidden');
  adminForm.classList.add('hidden');

  if(tab === 'login'){
    mainToggle.classList.remove('hidden');
    loginTab.classList.add('active');
    signupTab.classList.remove('active');
    loginForm.classList.remove('hidden');
    heading.textContent = 'Welcome';
    subtext.textContent = 'The smart solution to your queue needs.';
    footLink.textContent = 'New here? Create an account';
    footLink.onclick = () => switchTab('signup');
    adminLink.style.display = '';
    adminLink.textContent = 'Administrator Login';
    adminLink.onclick = () => switchTab('admin');
  } else if(tab === 'signup'){
    mainToggle.classList.remove('hidden');
    signupTab.classList.add('active');
    loginTab.classList.remove('active');
    signupForm.classList.remove('hidden');
    heading.textContent = 'Create your account';
    subtext.textContent = 'Set up your first queue in under a minute.';
    footLink.textContent = 'Already have an account? Log in';
    footLink.onclick = () => switchTab('login');
    adminLink.style.display = '';
    adminLink.textContent = 'Administrator Login';
    adminLink.onclick = () => switchTab('admin');
  } else if(tab === 'admin'){
    mainToggle.classList.add('hidden');
    adminForm.classList.remove('hidden');
    heading.textContent = 'Administrator Login';
    subtext.textContent = 'Restricted access for QueueSmart staff.';
    footLink.textContent = 'Back to login';
    footLink.onclick = () => switchTab('login');
    adminLink.style.display = 'none';
  }
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function setError(id, msg){
  document.getElementById(id).textContent = msg;
  const input = document.getElementById(id.replace('Err',''));
  if(input) input.classList.toggle('err', !!msg);
}

function isValidEmail(v){
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
}

function handleLogin(e){
  e.preventDefault();
  let valid = true;
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPassword').value;

  if(!email){ setError('loginEmailErr','Email is required'); valid=false; }
  else if(!isValidEmail(email)){ setError('loginEmailErr','Enter a valid email'); valid=false; }
  else setError('loginEmailErr','');

  if(!pass){ setError('loginPasswordErr','Password is required'); valid=false; }
  else setError('loginPasswordErr','');

  if(valid){
    // Real auth API goes here
    showToast('Login validated — The API will be connected later');
  }
  return false;
}

function handleSignup(e){
  e.preventDefault();
  let valid = true;
  const name = document.getElementById('signupName').value.trim();
  const email = document.getElementById('signupEmail').value.trim();
  const pass = document.getElementById('signupPassword').value;
  const confirm = document.getElementById('signupConfirm').value;

  if(!name){ setError('signupNameErr','Name is required'); valid=false; }
  else if(name.length > 50){ setError('signupNameErr','Name must be under 50 characters in length.')}
  else setError('signupNameErr','');

  if(!email){ setError('signupEmailErr','Email is required'); valid=false; }
  else if(!isValidEmail(email)){ setError('signupEmailErr','Enter a valid email'); valid=false; }
  else setError('signupEmailErr','');

  if(!pass){ setError('signupPasswordErr','Password is required'); valid=false; }
  else if(pass.length < 8){ setError('signupPasswordErr','Use at least 8 characters'); valid=false; }
  else if(pass.length > 20){ setError('signupPasswordErr','Password must be between 8 and 20 characters in length'); valid=false; }
  else setError('signupPasswordErr','');

  if(confirm !== pass || !confirm){ setError('signupConfirmErr','Passwords don\'t match'); valid=false; }
  else setError('signupConfirmErr','');

  if(valid){
    // Plug in your real signup API call here
    showToast('Signup validated — wire up your API here');
  }
  return false;
}
</script>
